name: Mobile CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.2"
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run test:ci
      - name: Measure global coverage
        run: npm run test:coverage:global:ci
      - name: Enforce gradual global coverage
        env:
          MOBILE_COVERAGE_THRESHOLD: ${{ vars.MOBILE_COVERAGE_THRESHOLD || '35' }}
        run: npm run coverage:check
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: coverage
          retention-days: 14
      - run: npm run typecheck
      - run: npm run doctor
